<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Sankey &#8212; Revenue & Cost Breakdown by Year</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header { padding: 28px 40px 8px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .header .sub { font-size: 13px; color: #666; margin-top: 4px; }
  .status-bar {
    padding: 0 40px;
    margin-bottom: 8px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  .status-dot.live { background: #4ade80; }
  .status-dot.error { background: #f87171; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .controls {
    display: flex; gap: 24px; padding: 0 40px; margin-bottom: 8px; align-items: center;
  }
  .control-group { display: flex; gap: 4px; align-items: center; }
  .control-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; }
  .scenario-tabs { display: flex; gap: 4px; }
  .scenario-tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; transition: all 0.2s; user-select: none;
  }
  .scenario-tab:hover { background: #22253a; color: #bbb; }
  .scenario-tab.active { color: #fff; }
  .scenario-tab.active[data-scenario="Bull"] { background: #1a3a2a; border-color: #4ade80; color: #4ade80; }
  .scenario-tab.active[data-scenario="Base"] { background: #1a2a3a; border-color: #60a5fa; color: #60a5fa; }
  .scenario-tab.active[data-scenario="Bear"] { background: #3a2020; border-color: #f87171; color: #f87171; }
  .scenario-tab.active[data-scenario="Organic"] { background: #2a2a1a; border-color: #fbbf24; color: #fbbf24; }
  .year-tabs {
    display: flex; gap: 4px; padding: 0 40px; margin-bottom: 0;
  }
  .year-tab {
    padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 14px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; border-bottom: none; transition: all 0.2s; user-select: none;
  }
  .year-tab:hover { background: #22253a; color: #bbb; }
  .year-tab.active { background: #1e2130; color: #fff; border-color: #3a3f55; }
  .chart-container {
    background: #1e2130; margin: 0 40px 20px; border-radius: 0 12px 12px 12px;
    border: 1px solid #2a2d37; padding: 20px; position: relative;
  }
  .chart-container .year-label {
    position: absolute; top: 16px; left: 24px; font-size: 14px; color: #666;
  }
  svg { display: block; width: 100%; height: auto; }
  .kpi-row {
    display: flex; gap: 16px; padding: 0 40px 24px; flex-wrap: wrap;
  }
  .kpi {
    background: #1a1d27; border: 1px solid #2a2d37; border-radius: 10px;
    padding: 14px 20px; flex: 1; min-width: 140px;
  }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .kpi-value.green { color: #4ade80; }
  .kpi-value.blue { color: #60a5fa; }
  .kpi-value.amber { color: #fbbf24; }
  .kpi-value.red { color: #f87171; }
  .kpi-value.purple { color: #c084fc; }
  .kpi-sub { font-size: 11px; color: #666; margin-top: 2px; }
  .tooltip {
    position: fixed; background: #1a1d27; border: 1px solid #3a3f55;
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #ddd;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>P&L Sankey &#8212; Revenue & Cost Breakdown</h1>
  <div class="sub">45_Combined &middot; Sourced from Grinn MCP Server via Microsoft Graph API</div>
</div>
<div class="status-bar" id="statusBar">
  <span class="status-dot loading" id="statusDot"></span>
  <span id="statusText" style="color: #888;">Loading data...</span>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">Scenario</span>
    <div class="scenario-tabs" id="scenarioTabs"></div>
  </div>
</div>

<div class="year-tabs" id="yearTabs"></div>
<div class="chart-container">
  <div class="year-label" id="yearLabel"></div>
  <svg id="sankey" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div class="kpi-row" id="kpis"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ââ MCP Server config (Graph API via grinn-mcp) ââ
const GRAPH_BASE = 'https://graph.microsoft.com/v1.0';
const DRIVE_ITEM_PATH = 'Grinn/Grinn_v17_r41.xlsm';
const WORKBOOK_URL = `${GRAPH_BASE}/me/drive/root:/${DRIVE_ITEM_PATH}:/workbook`;
const SHEET = '45_Combined';

// Azure AD / MSAL config
const CLIENT_ID = '41358f91-0b50-4cb7-bde8-60d546432369';
const TENANT_ID = '4e94611e-6eea-4f3d-951d-579ac8064d5c';
const SCOPES = ['Files.ReadWrite'];

// Snapshot block start rows in 45_Combined (same layout as MCP server)
const SNAPSHOT_STARTS = { Bull: 30, Base: 59, Bear: 88, Organic: 114 };
const N_ROWS = 24;

const years = ['2026', '2027', '2028', '2029', '2030'];
const yearCols = { '2026': 'B', '2027': 'C', '2028': 'D', '2029': 'E', '2030': 'F' };

// Row offsets within each snapshot block (0-indexed from block start)
const ROW_OFFSET = {
  bespokeRev: 0, modulesRev: 1, boardsRev: 2, totalRev: 3,
  bespokeCOGS: 4, modulesCOGS: 5, boardsCOGS: 6, totalCOGS: 7,
  grossProfit: 8, grossMargin: 9,
  sm: 10, rd: 11, ga: 12, totalOpEx: 13,
  ebitda: 14, ebitdaMargin: 15
};

const scenarios = ['Bull', 'Base', 'Bear', 'Organic'];
let allData = {};       // { scenario: { year: { metric: value } } }
let activeScenario = 'Base';
let activeYear = '2026';
let msalInstance = null;
let accessToken = null;

// ââ MSAL Auth ââ
async function initAuth() {
  // Dynamically load MSAL.js
  if (!window.msal) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load MSAL library from CDN'));
      document.head.appendChild(s);
    });
  }

  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: { cacheLocation: 'localStorage' },
  });

  await msalInstance.initialize();

  // Handle redirect response (if returning from login)
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) {
      accessToken = resp.accessToken;
      return;
    }
  } catch (e) { console.warn('Redirect handling:', e); }

  // Try silent token
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const result = await msalInstance.acquireTokenSilent({
        scopes: SCOPES,
        account: accounts[0],
      });
      accessToken = result.accessToken;
      return;
    } catch (e) { console.warn('Silent auth failed, will prompt:', e); }
  }

  // Interactive login via popup
  try {
    const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    accessToken = result.accessToken;
  } catch (e) {
    throw new Error('Authentication failed: ' + e.message);
  }
}

// ââ Graph API calls ââ
async function graphGet(url) {
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${accessToken}` }
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Graph API ${res.status}: ${text.substring(0, 200)}`);
  }
  return res.json();
}

async function readRange(sheet, address) {
  const url = `${WORKBOOK_URL}/worksheets('${sheet}')/range(address='${address}')`;
  const data = await graphGet(url);
  return data.values || [];
}

// ââ Fetch all scenarios from snapshot blocks ââ
async function fetchAllScenarios() {
  const keys = Object.keys(ROW_OFFSET);

  // Read all 4 snapshot blocks in parallel
  const reads = scenarios.map(async (scenario) => {
    const start = SNAPSHOT_STARTS[scenario];
    const end = start + N_ROWS - 1;
    const address = `B${start}:F${end}`;
    const values = await readRange(SHEET, address);

    const scenarioData = {};
    for (let yi = 0; yi < years.length; yi++) {
      const yearData = {};
      for (const [key, offset] of Object.entries(ROW_OFFSET)) {
        yearData[key] = values[offset] ? (values[offset][yi] || 0) : 0;
      }
      scenarioData[years[yi]] = yearData;
    }
    return { scenario, data: scenarioData };
  });

  const results = await Promise.all(reads);
  for (const r of results) {
    allData[r.scenario] = r.data;
  }
}

// ââ Formatting ââ
function fmt(v) {
  if (Math.abs(v) >= 1e6) return '\u20AC' + (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return '\u20AC' + (v / 1e3).toFixed(0) + 'k';
  return '\u20AC' + Math.round(v);
}
function pct(v) { return (v * 100).toFixed(1) + '%'; }

// ââ Tooltip ââ
const tooltip = document.getElementById('tooltip');
function showTip(e, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}
function hideTip() { tooltip.classList.remove('visible'); }

// ââ Render ââ
function renderSankey(year) {
  activeYear = year;
  const d = allData[activeScenario] && allData[activeScenario][year];
  if (!d) return;

  const svg = document.getElementById('sankey');
  svg.innerHTML = '';

  document.getElementById('yearLabel').textContent = year + ' \u2014 ' + activeScenario + ' Scenario';

  const W = 900, H = 560;
  const colX = [40, 280, 500, 740];
  const nodeW = 22;
  const topPad = 50;
  const scale = (H - 80) / d.totalRev;

  // Col 0: Revenue sources
  const revSources = [
    { label: 'Bespoke', val: d.bespokeRev, color: '#60a5fa' },
    { label: 'Modules', val: d.modulesRev, color: '#818cf8' },
    { label: 'Boards', val: d.boardsRev, color: '#a78bfa' },
  ];
  let y0 = topPad;
  const revNodes = revSources.map(s => {
    const h = s.val * scale;
    const node = { ...s, x: colX[0], y: y0, h };
    y0 += h + 12;
    return node;
  });

  const totalRevH = d.totalRev * scale;
  const totalRevNode = { label: 'Total Revenue', val: d.totalRev, color: '#3b82f6', x: colX[1], y: topPad, h: totalRevH };

  // Col 2
  const col2Items = [
    { label: 'Gross Profit', val: d.grossProfit, color: '#4ade80' },
    { label: 'Bespoke COGS', val: d.bespokeCOGS, color: '#f87171' },
    { label: 'Modules COGS', val: d.modulesCOGS, color: '#fb923c' },
    { label: 'Boards COGS', val: d.boardsCOGS, color: '#fbbf24' },
  ];
  let y2 = topPad;
  const col2Nodes = col2Items.map(s => {
    const h = s.val * scale;
    const node = { ...s, x: colX[2], y: y2, h };
    y2 += h + 8;
    return node;
  });

  // Col 3
  const col3Items = [
    { label: 'EBITDA', val: d.ebitda, color: '#22d3ee' },
    { label: 'S&M', val: d.sm, color: '#f472b6' },
    { label: 'R&D', val: d.rd, color: '#e879f9' },
    { label: 'G&A', val: d.ga, color: '#c084fc' },
  ];
  let y3 = topPad;
  const col3Nodes = col3Items.map(s => {
    const h = s.val * scale;
    const node = { ...s, x: colX[3], y: y3, h };
    y3 += h + 8;
    return node;
  });

  function flowPath(sx, sy, sh, tx, ty, th) {
    const sR = sx + nodeW, tL = tx, mx = (sR + tL) / 2;
    return `M ${sR} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tL} ${ty} L ${tL} ${ty+th} C ${mx} ${ty+th}, ${mx} ${sy+sh}, ${sR} ${sy+sh} Z`;
  }

  // Flows
  let off1 = topPad;
  const flows1 = revNodes.map(n => {
    const th = n.val * scale;
    const p = flowPath(n.x, n.y, n.h, totalRevNode.x, off1, th);
    off1 += th;
    return { path: p, color: n.color, from: n.label, to: 'Total Revenue', val: n.val };
  });

  let off2 = topPad;
  const flows2 = col2Nodes.map(n => {
    const sh = n.val * scale;
    const p = flowPath(totalRevNode.x, off2, sh, n.x, n.y, n.h);
    off2 += sh;
    return { path: p, color: n.color, from: 'Total Revenue', to: n.label, val: n.val };
  });

  let off3 = col2Nodes[0].y;
  const flows3 = col3Nodes.map(n => {
    const sh = n.val * scale;
    const p = flowPath(col2Nodes[0].x, off3, sh, n.x, n.y, n.h);
    off3 += sh;
    return { path: p, color: n.color, from: 'Gross Profit', to: n.label, val: n.val };
  });

  [...flows1, ...flows2, ...flows3].forEach(f => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', f.path);
    el.setAttribute('fill', f.color);
    el.setAttribute('fill-opacity', '0.22');
    el.setAttribute('stroke', f.color);
    el.setAttribute('stroke-opacity', '0.3');
    el.setAttribute('stroke-width', '0.5');
    el.style.cursor = 'pointer';
    el.style.transition = 'fill-opacity 0.15s';
    el.addEventListener('mouseenter', e => {
      el.setAttribute('fill-opacity', '0.45');
      showTip(e, `<strong>${f.from} \u2192 ${f.to}</strong><br>${fmt(f.val)} (${pct(f.val / d.totalRev)} of rev)`);
    });
    el.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      el.setAttribute('fill-opacity', '0.22');
      hideTip();
    });
    svg.appendChild(el);
  });

  // Nodes
  [...revNodes, totalRevNode, ...col2Nodes, ...col3Nodes].forEach(n => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', n.x);
    rect.setAttribute('y', n.y);
    rect.setAttribute('width', nodeW);
    rect.setAttribute('height', Math.max(n.h, 3));
    rect.setAttribute('rx', 3);
    rect.setAttribute('fill', n.color);
    rect.setAttribute('fill-opacity', '0.9');
    rect.style.cursor = 'pointer';
    rect.addEventListener('mouseenter', e => {
      rect.setAttribute('fill-opacity', '1');
      showTip(e, `<strong>${n.label}</strong><br>${fmt(n.val)}<br>${pct(n.val / d.totalRev)} of revenue`);
    });
    rect.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    rect.addEventListener('mouseleave', () => {
      rect.setAttribute('fill-opacity', '0.9');
      hideTip();
    });
    svg.appendChild(rect);

    const textX = n.x === colX[0] ? n.x - 10 : n.x + nodeW + 10;
    const anchor = n.x === colX[0] ? 'end' : 'start';

    if (n.h > 14) {
      const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', textX); t1.setAttribute('y', n.y + n.h/2 - 7);
      t1.setAttribute('text-anchor', anchor); t1.setAttribute('fill', '#ccc');
      t1.setAttribute('font-size', '12'); t1.setAttribute('font-weight', '500');
      t1.textContent = n.label;
      svg.appendChild(t1);

      const t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t2.setAttribute('x', textX); t2.setAttribute('y', n.y + n.h/2 + 8);
      t2.setAttribute('text-anchor', anchor); t2.setAttribute('fill', '#888');
      t2.setAttribute('font-size', '11');
      t2.textContent = fmt(n.val);
      svg.appendChild(t2);
    } else {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', textX); t.setAttribute('y', n.y + n.h/2 + 4);
      t.setAttribute('text-anchor', anchor); t.setAttribute('fill', '#aaa');
      t.setAttribute('font-size', '11');
      t.textContent = n.label + ' ' + fmt(n.val);
      svg.appendChild(t);
    }
  });

  // Column headers
  [
    { x: colX[0] + nodeW/2, label: 'REVENUE SOURCES' },
    { x: colX[1] + nodeW/2, label: 'TOTAL' },
    { x: colX[2] + nodeW/2, label: 'MARGIN / COGS' },
    { x: colX[3] + nodeW/2, label: 'EBITDA / OPEX' },
  ].forEach(h => {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', h.x); t.setAttribute('y', 28);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#555');
    t.setAttribute('font-size', '10'); t.setAttribute('letter-spacing', '1');
    t.textContent = h.label;
    svg.appendChild(t);
  });

  // KPIs
  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value blue">${fmt(d.totalRev)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Gross Profit</div>
      <div class="kpi-value green">${fmt(d.grossProfit)}</div>
      <div class="kpi-sub">Margin: ${pct(d.grossMargin)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total OpEx</div>
      <div class="kpi-value amber">${fmt(d.totalOpEx)}</div>
      <div class="kpi-sub">${pct(d.totalOpEx / d.totalRev)} of revenue</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">EBITDA</div>
      <div class="kpi-value ${d.ebitda >= 0 ? 'green' : 'red'}">${fmt(d.ebitda)}</div>
      <div class="kpi-sub">Margin: ${pct(d.ebitdaMargin)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Revenue Mix</div>
      <div class="kpi-value purple">${pct(d.modulesRev / d.totalRev)}</div>
      <div class="kpi-sub">Modules share</div>
    </div>
  `;
}

// ââ Init ââ
function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = msg;
}

// Scenario tabs
const scenarioTabsEl = document.getElementById('scenarioTabs');
scenarios.forEach((s) => {
  const tab = document.createElement('div');
  tab.className = 'scenario-tab' + (s === activeScenario ? ' active' : '');
  tab.setAttribute('data-scenario', s);
  tab.textContent = s;
  tab.onclick = () => {
    activeScenario = s;
    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(activeYear);
  };
  scenarioTabsEl.appendChild(tab);
});

// Year tabs
const tabsEl = document.getElementById('yearTabs');
years.forEach((y, i) => {
  const tab = document.createElement('div');
  tab.className = 'year-tab' + (i === 0 ? ' active' : '');
  tab.textContent = y;
  tab.onclick = () => {
    document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(y);
  };
  tabsEl.appendChild(tab);
});

// URL params: ?scenario=Bull&year=2028
const params = new URLSearchParams(window.location.search);
if (params.get('scenario') && scenarios.includes(params.get('scenario'))) {
  activeScenario = params.get('scenario');
}
if (params.get('year') && years.includes(params.get('year'))) {
  activeYear = params.get('year');
}

(async () => {
  try {
    setStatus('loading', 'Authenticating with Microsoft Graph API...');
    await initAuth();
    setStatus('loading', 'Fetching scenario data from Grinn model...');
    await fetchAllScenarios();
    const now = new Date().toLocaleTimeString();
    setStatus('live', `Live from Graph API \u2014 last fetched ${now}`);

    // Sync active tabs with URL params
    document.querySelectorAll('.scenario-tab').forEach(t => {
      t.classList.toggle('active', t.getAttribute('data-scenario') === activeScenario);
    });
    document.querySelectorAll('.year-tab').forEach(t => {
      t.classList.toggle('active', t.textContent === activeYear);
    });

    renderSankey(activeYear);
  } catch (err) {
    setStatus('error', `Failed: ${err.message}`);
    console.error(err);
  }
})();
</script>
</body>
</html>
