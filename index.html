<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Sankey &#8212; Revenue & Cost Breakdown by Year</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/sankey.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header { padding: 28px 40px 8px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .header .sub { font-size: 13px; color: #666; margin-top: 4px; }
  .status-bar {
    padding: 0 40px; margin-bottom: 8px; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  .status-dot.live { background: #4ade80; }
  .status-dot.error { background: #f87171; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .controls {
    display: flex; gap: 24px; padding: 0 40px; margin-bottom: 8px; align-items: center;
  }
  .control-group { display: flex; gap: 4px; align-items: center; }
  .control-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; }
  .scenario-tabs { display: flex; gap: 4px; }
  .scenario-tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; transition: all 0.2s; user-select: none;
  }
  .scenario-tab:hover { background: #22253a; color: #bbb; }
  .scenario-tab.active { color: #fff; }
  .scenario-tab.active[data-scenario="Bull"] { background: #1a3a2a; border-color: #4ade80; color: #4ade80; }
  .scenario-tab.active[data-scenario="Base"] { background: #1a2a3a; border-color: #60a5fa; color: #60a5fa; }
  .scenario-tab.active[data-scenario="Bear"] { background: #3a2020; border-color: #f87171; color: #f87171; }
  .scenario-tab.active[data-scenario="Organic"] { background: #2a2a1a; border-color: #fbbf24; color: #fbbf24; }
  .year-tabs { display: flex; gap: 4px; padding: 0 40px; margin-bottom: 0; }
  .year-tab {
    padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 14px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; border-bottom: none; transition: all 0.2s; user-select: none;
  }
  .year-tab:hover { background: #22253a; color: #bbb; }
  .year-tab.active { background: #1e2130; color: #fff; border-color: #3a3f55; }
  .chart-container {
    background: #1e2130; margin: 0 40px 20px; border-radius: 0 12px 12px 12px;
    border: 1px solid #2a2d37; position: relative;
  }
  .chart-container .year-label {
    position: absolute; top: 16px; left: 24px; font-size: 14px; color: #666; z-index: 10;
  }
  #sankeyChart { width: 100%; height: 640px; }
  .kpi-row { display: flex; gap: 16px; padding: 0 40px 24px; flex-wrap: wrap; }
  .kpi {
    background: #1a1d27; border: 1px solid #2a2d37; border-radius: 10px;
    padding: 14px 20px; flex: 1; min-width: 140px;
  }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .kpi-value.green { color: #4ade80; }
  .kpi-value.blue { color: #60a5fa; }
  .kpi-value.amber { color: #fbbf24; }
  .kpi-value.red { color: #f87171; }
  .kpi-value.purple { color: #c084fc; }
  .kpi-sub { font-size: 11px; color: #666; margin-top: 2px; }
  /* Highcharts dark overrides */
  .highcharts-background { fill: transparent !important; }
</style>
</head>
<body>

<div class="header">
  <h1>P&L Sankey &#8212; Revenue & Cost Breakdown</h1>
  <div class="sub">45_Combined &middot; Sourced from Grinn MCP Server via Microsoft Graph API</div>
</div>
<div class="status-bar" id="statusBar">
  <span class="status-dot loading" id="statusDot"></span>
  <span id="statusText" style="color: #888;">Loading data...</span>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">Scenario</span>
    <div class="scenario-tabs" id="scenarioTabs"></div>
  </div>
</div>

<div class="year-tabs" id="yearTabs"></div>
<div class="chart-container">
  <div class="year-label" id="yearLabel"></div>
  <div id="sankeyChart"></div>
</div>
<div class="kpi-row" id="kpis"></div>

<script>
// -- MCP Server config (Graph API via grinn-mcp) --
const GRAPH_BASE = 'https://graph.microsoft.com/v1.0';
const DRIVE_ITEM_PATH = 'Grinn/Grinn_v17_r41.xlsm';
const WORKBOOK_URL = `${GRAPH_BASE}/me/drive/root:/${DRIVE_ITEM_PATH}:/workbook`;
const SHEET = '45_Combined';

const CLIENT_ID = '41358f91-0b50-4cb7-bde8-60d546432369';
const TENANT_ID = '4e94611e-6eea-4f3d-951d-579ac8064d5c';
const SCOPES = ['Files.ReadWrite'];

const SNAPSHOT_STARTS = { Bull: 30, Base: 59, Bear: 88, Organic: 114 };
const N_ROWS = 24;

const years = ['2026', '2027', '2028', '2029', '2030'];

const ROW_OFFSET = {
  bespokeRev: 0, modulesRev: 1, boardsRev: 2, totalRev: 3,
  bespokeCOGS: 4, modulesCOGS: 5, boardsCOGS: 6, totalCOGS: 7,
  grossProfit: 8, grossMargin: 9,
  sm: 10, rd: 11, ga: 12, totalOpEx: 13,
  ebitda: 14, ebitdaMargin: 15
};

const scenarios = ['Bull', 'Base', 'Bear', 'Organic'];
let allData = {};
let activeScenario = 'Base';
let activeYear = '2026';
let msalInstance = null;
let accessToken = null;
let chart = null;

// -- MSAL Auth --
async function initAuth() {
  if (!window.msal) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load MSAL library from CDN'));
      document.head.appendChild(s);
    });
  }
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: { cacheLocation: 'localStorage' },
  });
  await msalInstance.initialize();
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) { accessToken = resp.accessToken; return; }
  } catch (e) { console.warn('Redirect handling:', e); }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      accessToken = result.accessToken; return;
    } catch (e) { console.warn('Silent auth failed:', e); }
  }
  try {
    const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    accessToken = result.accessToken;
  } catch (e) { await msalInstance.acquireTokenRedirect({ scopes: SCOPES }); }
}

// -- Graph API --
let sessionId = null;
async function createWorkbookSession() {
  try {
    const res = await fetch(`${WORKBOOK_URL}/createSession`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ persistChanges: false })
    });
    if (res.ok) { const data = await res.json(); sessionId = data.id; }
  } catch (e) { console.warn('Session creation failed:', e); }
}

async function graphGet(url, retries = 3) {
  for (let i = 0; i < retries; i++) {
    const headers = { 'Authorization': `Bearer ${accessToken}` };
    if (sessionId) headers['workbook-session-id'] = sessionId;
    const res = await fetch(url, { headers });
    if (res.ok) return res.json();
    if (res.status === 504 && i < retries - 1) {
      setStatus('loading', `Graph API timeout, retrying (${i+1}/${retries-1})...`);
      await new Promise(r => setTimeout(r, 3000 * (i + 1)));
      continue;
    }
    const text = await res.text();
    throw new Error(`Graph API ${res.status}: ${text.substring(0, 200)}`);
  }
}

async function readRange(sheet, address) {
  const url = `${WORKBOOK_URL}/worksheets('${sheet}')/range(address='${address}')`;
  const data = await graphGet(url);
  return data.values || [];
}

async function fetchAllScenarios() {
  const firstRow = 30, lastRow = 114 + N_ROWS - 1;
  const address = `B${firstRow}:F${lastRow}`;
  setStatus('loading', 'Reading all scenarios...');
  const allValues = await readRange(SHEET, address);
  for (const scenario of scenarios) {
    const blockStart = SNAPSHOT_STARTS[scenario] - firstRow;
    const scenarioData = {};
    for (let yi = 0; yi < years.length; yi++) {
      const yearData = {};
      for (const [key, offset] of Object.entries(ROW_OFFSET)) {
        const row = blockStart + offset;
        yearData[key] = allValues[row] ? (allValues[row][yi] || 0) : 0;
      }
      scenarioData[years[yi]] = yearData;
    }
    allData[scenario] = scenarioData;
  }
}

// -- Formatting --
function fmt(v) {
  if (Math.abs(v) >= 1e6) return '\u20AC' + (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return '\u20AC' + (v / 1e3).toFixed(0) + 'k';
  return '\u20AC' + Math.round(v);
}
function pct(v) { return (v * 100).toFixed(1) + '%'; }

// -- Render Sankey with Highcharts --
function renderSankey(year) {
  activeYear = year;
  const d = allData[activeScenario] && allData[activeScenario][year];
  if (!d) return;
  document.getElementById('yearLabel').textContent = year + ' \u2014 ' + activeScenario + ' Scenario';

  const COL = {
    bespoke: '#3b82f6', boards: '#f59e0b', modules: '#22c55e',
    revenue: '#1e3a5f',
    gp: '#10b981', cogs: '#ef4444',
    ebitda: '#22c55e', sm: '#e879f9', rd: '#818cf8', ga: '#fb923c',
    bespokeCogs: '#f87171', modulesCogs: '#fb923c', boardsCogs: '#fbbf24'
  };

  if (chart) chart.destroy();

  chart = Highcharts.chart('sankeyChart', {
    chart: {
      backgroundColor: 'transparent',
      style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }
    },
    title: { text: null },
    credits: { enabled: false },
    exporting: { enabled: false },
    tooltip: {
      backgroundColor: '#1a1d27',
      borderColor: '#3a3f55',
      style: { color: '#e0e0e0', fontSize: '12px' },
      nodeFormatter: function() {
        return '<b>' + this.name + '</b><br>' + fmt(this.sum);
      },
      pointFormatter: function() {
        return this.fromNode.name + ' \u2192 ' + this.toNode.name +
          '<br><b>' + fmt(this.weight) + '</b>' +
          ' (' + pct(this.weight / d.totalRev) + ' of revenue)';
      }
    },
    plotOptions: {
      sankey: {
        nodeWidth: 8,
        nodePadding: 36,
        curveFactor: 0.6,
        linkOpacity: 0.45,
        borderWidth: 0,
        colorByPoint: false,
        dataLabels: {
          enabled: true,
          color: '#e0e0e0',
          style: {
            fontSize: '11px',
            fontWeight: '600',
            textOutline: 'none'
          },
          nodeFormatter: function() {
            const name = this.point.name || this.key;
            let extra = '';
            if (name === 'Gross Profit') extra = '<br><span style="font-size:10px;color:#888">' + pct(d.grossMargin) + ' margin</span>';
            else if (name === 'EBITDA') extra = '<br><span style="font-size:10px;color:#888">' + pct(d.ebitdaMargin) + ' margin</span>';
            else if (name !== 'Revenue') extra = '<br><span style="font-size:10px;color:#888">' + pct(Math.abs(this.point.sum) / d.totalRev) + ' of rev</span>';
            return '<span style="font-weight:600">' + name + '</span><br>' + fmt(this.point.sum) + extra;
          },
          useHTML: true
        },
        states: {
          hover: { linkOpacity: 0.7 },
          inactive: { linkOpacity: 0.15 }
        }
      }
    },
    series: [{
      type: 'sankey',
      keys: ['from', 'to', 'weight'],
      nodes: [
        { id: 'Bespoke', color: COL.bespoke, column: 0 },
        { id: 'Boards', color: COL.boards, column: 0 },
        { id: 'Modules', color: COL.modules, column: 0 },
        { id: 'Revenue', color: COL.revenue, column: 1 },
        { id: 'Gross Profit', color: COL.gp, column: 2 },
        { id: 'COGS', color: COL.cogs, column: 2 },
        { id: 'EBITDA', color: COL.ebitda, column: 3 },
        { id: 'S&M', color: COL.sm, column: 3 },
        { id: 'R&D', color: COL.rd, column: 3 },
        { id: 'G&A', color: COL.ga, column: 3 },
        { id: 'Other OpEx', color: '#94a3b8', column: 3 },
        { id: 'Bespoke COGS', color: COL.bespokeCogs, column: 3 },
        { id: 'Modules COGS', color: COL.modulesCogs, column: 3 },
        { id: 'Boards COGS', color: COL.boardsCogs, column: 3 },
      ],
      data: (function() {
        const otherOpEx = d.totalOpEx - Math.abs(d.sm) - Math.abs(d.rd) - Math.abs(d.ga);
        const links = [
          ['Bespoke', 'Revenue', d.bespokeRev],
          ['Boards', 'Revenue', d.boardsRev],
          ['Modules', 'Revenue', d.modulesRev],
          ['Revenue', 'Gross Profit', d.grossProfit],
          ['Revenue', 'COGS', d.totalCOGS],
          ['Gross Profit', 'EBITDA', Math.abs(d.ebitda)],
          ['Gross Profit', 'S&M', Math.abs(d.sm)],
          ['Gross Profit', 'R&D', Math.abs(d.rd)],
          ['Gross Profit', 'G&A', Math.abs(d.ga)],
        ];
        if (otherOpEx > 0) links.push(['Gross Profit', 'Other OpEx', otherOpEx]);
        // COGS breakdown (right of COGS bar)
        links.push(['COGS', 'Bespoke COGS', Math.abs(d.bespokeCOGS)]);
        links.push(['COGS', 'Modules COGS', Math.abs(d.modulesCOGS)]);
        links.push(['COGS', 'Boards COGS', Math.abs(d.boardsCOGS)]);
        return links;
      })()
    }]
  });

  // KPIs
  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value blue">${fmt(d.totalRev)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Gross Profit</div>
      <div class="kpi-value green">${fmt(d.grossProfit)}</div>
      <div class="kpi-sub">Margin: ${pct(d.grossMargin)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total OpEx</div>
      <div class="kpi-value amber">${fmt(d.totalOpEx)}</div>
      <div class="kpi-sub">${pct(d.totalOpEx / d.totalRev)} of revenue</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">EBITDA</div>
      <div class="kpi-value ${d.ebitda >= 0 ? 'green' : 'red'}">${fmt(d.ebitda)}</div>
      <div class="kpi-sub">Margin: ${pct(d.ebitdaMargin)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Revenue Mix</div>
      <div class="kpi-value purple">${pct(d.modulesRev / d.totalRev)}</div>
      <div class="kpi-sub">Modules share</div>
    </div>
  `;
}

function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

// Scenario tabs
const scenarioTabsEl = document.getElementById('scenarioTabs');
scenarios.forEach(s => {
  const tab = document.createElement('div');
  tab.className = 'scenario-tab' + (s === activeScenario ? ' active' : '');
  tab.setAttribute('data-scenario', s);
  tab.textContent = s;
  tab.onclick = () => {
    activeScenario = s;
    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(activeYear);
  };
  scenarioTabsEl.appendChild(tab);
});

// Year tabs
const tabsEl = document.getElementById('yearTabs');
years.forEach((y, i) => {
  const tab = document.createElement('div');
  tab.className = 'year-tab' + (i === 0 ? ' active' : '');
  tab.textContent = y;
  tab.onclick = () => {
    document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(y);
  };
  tabsEl.appendChild(tab);
});

// URL params
const params = new URLSearchParams(window.location.search);
if (params.get('scenario') && scenarios.includes(params.get('scenario'))) activeScenario = params.get('scenario');
if (params.get('year') && years.includes(params.get('year'))) activeYear = params.get('year');

(async () => {
  try {
    setStatus('loading', 'Authenticating with Microsoft Graph API...');
    await initAuth();
    setStatus('loading', 'Opening workbook session...');
    await createWorkbookSession();
    setStatus('loading', 'Fetching scenario data from Grinn model...');
    await fetchAllScenarios();
    setStatus('live', `Live from Graph API \u2014 last fetched ${new Date().toLocaleTimeString()}`);
    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-scenario') === activeScenario));
    document.querySelectorAll('.year-tab').forEach(t => t.classList.toggle('active', t.textContent === activeYear));
    renderSankey(activeYear);
  } catch (err) {
    setStatus('error', `Failed: ${err.message}`);
    console.error(err);
  }
})();
</script>
</body>
</html>
