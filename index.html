<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Sankey &#8212; Revenue & Cost Breakdown by Year</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/sankey.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header { padding: 28px 40px 8px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .header .sub { font-size: 13px; color: #666; margin-top: 4px; }
  .status-bar {
    padding: 0 40px; margin-bottom: 8px; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  .status-dot.live { background: #4ade80; }
  .status-dot.error { background: #f87171; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .controls {
    display: flex; gap: 24px; padding: 0 40px; margin-bottom: 8px; align-items: center;
  }
  .control-group { display: flex; gap: 4px; align-items: center; }
  .control-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; }
  .scenario-tabs { display: flex; gap: 4px; }
  .scenario-tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; transition: all 0.2s; user-select: none;
  }
  .scenario-tab:hover { background: #22253a; color: #bbb; }
  .scenario-tab.active { color: #fff; }
  .scenario-tab.active[data-scenario="Bull"] { background: #1a3a2a; border-color: #4ade80; color: #4ade80; }
  .scenario-tab.active[data-scenario="Base"] { background: #1a2a3a; border-color: #60a5fa; color: #60a5fa; }
  .scenario-tab.active[data-scenario="Bear"] { background: #3a2020; border-color: #f87171; color: #f87171; }
  .scenario-tab.active[data-scenario="Organic"] { background: #2a2a1a; border-color: #fbbf24; color: #fbbf24; }
  .year-tabs { display: flex; gap: 4px; padding: 0 40px; margin-bottom: 0; }
  .year-tab {
    padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 14px; font-weight: 500; background: #1a1d27; color: #888;
    border: 1px solid #2a2d37; border-bottom: none; transition: all 0.2s; user-select: none;
  }
  .year-tab:hover { background: #22253a; color: #bbb; }
  .year-tab.active { background: #1e2130; color: #fff; border-color: #3a3f55; }
  .chart-container {
    background: #1e2130; margin: 0 40px 20px; border-radius: 0 12px 12px 12px;
    border: 1px solid #2a2d37; position: relative;
  }
  .chart-container .year-label {
    position: absolute; top: 16px; left: 24px; font-size: 14px; color: #666; z-index: 10;
  }
  #sankeyChart { width: 100%; height: 780px; }
  .kpi-row { display: flex; gap: 16px; padding: 0 40px 24px; flex-wrap: wrap; }
  .kpi {
    background: #1a1d27; border: 1px solid #2a2d37; border-radius: 10px;
    padding: 14px 20px; flex: 1; min-width: 140px;
  }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .kpi-value.green { color: #4ade80; }
  .kpi-value.blue { color: #60a5fa; }
  .kpi-value.amber { color: #fbbf24; }
  .kpi-value.red { color: #f87171; }
  .kpi-value.purple { color: #c084fc; }
  .kpi-sub { font-size: 11px; color: #666; margin-top: 2px; }
  /* Highcharts dark overrides */
  .highcharts-background { fill: transparent !important; }
</style>
</head>
<body>

<div class="header">
  <h1>P&L Sankey &#8212; Revenue & Cost Breakdown</h1>
  <div class="sub">45_Combined &middot; Grinn Financial Model</div>
</div>
<div class="status-bar" id="statusBar">
  <span class="status-dot loading" id="statusDot"></span>
  <span id="statusText" style="color: #888;">Loading data...</span>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">Scenario</span>
    <div class="scenario-tabs" id="scenarioTabs"></div>
  </div>
</div>

<div class="year-tabs" id="yearTabs"></div>
<div class="chart-container">
  <div class="year-label" id="yearLabel"></div>
  <div id="sankeyChart"></div>
</div>
<div class="kpi-row" id="kpis"></div>

<script>
// Ã¢ÂÂÃ¢ÂÂ Override Sankey node ordering Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂ
// Reorder column 3 so COGS items are below Operating Profit/Expenses,
// and recompute shapeArgs + links after reordering.
(function(H) {
  const origTranslate = H.seriesTypes.sankey.prototype.translate;
  H.seriesTypes.sankey.prototype.translate = function() {
    origTranslate.apply(this, arguments);
    // Reorder column 3: Op Profit on top, Op Expenses next, then COGS items at bottom
    const col3 = (this.nodes || []).filter(n => n.column === 3);
    if (col3.length === 0) return;

    // Define desired order for column 3
    const order = ['Operating Profit', 'Operating Expenses', 'Bespoke COGS', 'Modules COGS', 'Boards COGS'];
    col3.sort((a, b) => {
      const ai = order.indexOf(a.name);
      const bi = order.indexOf(b.name);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });

    const padding = this.nodePadding || 28;
    const factor = this.translationFactor;
    let y = 0;
    col3.forEach(n => {
      n.nodeY = y;
      if (n.shapeArgs) n.shapeArgs.y = y;
      y += n.getSum() * factor + padding;
    });
    // Reorder column 4: Net Profit + Tax on top, then OpEx breakdown
        const col4 = (this.nodes || []).filter(n => n.column === 4);
        if (col4.length > 0) {
          const order4 = ['Net Profit', 'Tax', 'S&M', 'R&D', 'G&A', 'Other OpEx'];
          col4.sort((a, b) => {
            const ai = order4.indexOf(a.name);
            const bi = order4.indexOf(b.name);
            return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          });
          let y4 = 0;
          col4.forEach(n => {
            n.nodeY = y4;
            if (n.shapeArgs) n.shapeArgs.y = y4;
            y4 += n.getSum() * factor + padding;
          });
        }

        // Retranslate all links so paths follow moved nodes
    if (this.points) {
      this.points.forEach(p => {
        if (p.fromNode && p.toNode && typeof this.translateLink === 'function') {
          this.translateLink(p);
        }
      });
    }
  };
})(Highcharts);

// Ã¢ÂÂÃ¢ÂÂ Label-to-key mapping Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂ
const LABEL_MAP = {
  'Bespoke':         'bespokeRev',
  'Bespoke Revenue': 'bespokeRev',
  'Modules':         'modulesRev',
  'Modules Revenue': 'modulesRev',
  'Boards':          'boardsRev',
  'Boards Revenue':  'boardsRev',
  'Total Revenue':   'totalRev',
  'Revenue':         'totalRev',
  'Bespoke COGS': 'bespokeCOGS',
  'Modules COGS': 'modulesCOGS',
  'Boards COGS':  'boardsCOGS',
  'Total COGS':   'totalCOGS',
  'COGS':         'totalCOGS',
  'Gross Profit':    'grossProfit',
  'Gross Margin':    'grossMargin',
  'Gross Margin %':  'grossMargin',
  'GM%':             'grossMargin',
  'S&M':         'sm',
  'Sales & Marketing': 'sm',
  'R&D':         'rd',
  'Research & Development': 'rd',
  'G&A':         'ga',
  'General & Administrative': 'ga',
  'Total OpEx':  'totalOpEx',
  'OpEx':        'totalOpEx',
  'EBITDA':          'ebitda',
  'EBITDA Margin':   'ebitdaMargin',
  'EBITDA%':         'ebitdaMargin',
  'EBITDA %':        'ebitdaMargin',
  'Free Cash Flow':  'fcf',
  'Closing Cash':    'closingCash',
  'NRE':         'nreRev',
  'NRE Revenue': 'nreRev',
};

const scenarios = ['Bull', 'Base', 'Bear', 'Organic'];
const years = ['2026', '2027', '2028', '2029', '2030'];
let allData = {};
let rawLabels = {};
let activeScenario = 'Base';
let activeYear = '2026';
let chart = null;
let dataTimestamp = null;

async function loadData() {
  setStatus('loading', 'Loading model data...');
  const res = await fetch('data.json?t=' + Date.now());
  if (!res.ok) throw new Error('Failed to load data.json: ' + res.status);
  const json = await res.json();
  dataTimestamp = json.updated;

  for (const scenario of scenarios) {
    const block = json.scenarios[scenario];
    if (!block) continue;
    rawLabels[scenario] = block.labels || [];
    const scenarioData = {};

    for (const year of years) {
      const yearRaw = block.data[year] || {};
      const yearData = {};
      for (const [label, value] of Object.entries(yearRaw)) {
        const key = LABEL_MAP[label];
        if (key) {
          yearData[key] = typeof value === 'number' ? value : 0;
        }
        yearData['_raw_' + label] = value;
      }
      scenarioData[year] = yearData;
    }
    allData[scenario] = scenarioData;
  }
}

function fmt(v) {
  if (Math.abs(v) >= 1e6) return '\u20AC' + (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return '\u20AC' + (v / 1e3).toFixed(0) + 'k';
  return '\u20AC' + Math.round(v);
}
function pct(v) { return (v * 100).toFixed(1) + '%'; }

function renderSankey(year) {
  activeYear = year;
  const d = allData[activeScenario] && allData[activeScenario][year];
  if (!d) return;
  document.getElementById('yearLabel').textContent = year + ' \u2014 ' + activeScenario + ' Scenario';

  const COL = {
    bespoke: '#3b82f6', boards: '#f59e0b', modules: '#22c55e',
    nre: '#06b6d4',
    revenue: '#1e3a5f',
    gp: '#10b981', cogs: '#ef4444',
    ebitda: '#22c55e', sm: '#e879f9', rd: '#818cf8', ga: '#fb923c',
    bespokeCogs: '#f87171', modulesCogs: '#fb923c', boardsCogs: '#fbbf24', netProfit: '#34d399', tax: '#9ca3af'
  };

  const nodes = [];
  const links = [];

  // Column 0: Revenue sources
  const revSources = [];
  if (d.bespokeRev > 0) { nodes.push({ id: 'Bespoke', color: COL.bespoke, column: 0 }); revSources.push(['Bespoke', d.bespokeRev]); }
  if (d.boardsRev > 0)  { nodes.push({ id: 'Boards', color: COL.boards, column: 0 }); revSources.push(['Boards', d.boardsRev]); }
  if (d.modulesRev > 0)  { nodes.push({ id: 'Modules', color: COL.modules, column: 0 }); revSources.push(['Modules', d.modulesRev]); }
  if (d.nreRev > 0)      { nodes.push({ id: 'NRE', color: COL.nre, column: 0 }); revSources.push(['NRE', d.nreRev]); }

  // Column 1: Revenue
  nodes.push({ id: 'Revenue', color: COL.revenue, column: 1 });
  for (const [name, val] of revSources) links.push([name, 'Revenue', val]);

  // Column 2: Gross Profit + Gross COGS
  const totalCOGS = Math.abs(d.bespokeCOGS || 0) + Math.abs(d.modulesCOGS || 0) + Math.abs(d.boardsCOGS || 0);
  nodes.push({ id: 'Gross Profit', color: COL.gp, column: 2 });
  if (totalCOGS > 0) nodes.push({ id: 'Gross COGS', color: COL.cogs, column: 2 });
  links.push(['Revenue', 'Gross Profit', d.grossProfit || 0]);
  if (totalCOGS > 0) links.push(['Revenue', 'Gross COGS', totalCOGS]);

  // Column 3: Gross Profit -> Operating Profit + Operating Expenses
  //           Gross COGS -> Bespoke COGS + Modules COGS + Boards COGS
  const totalOpExVal = Math.abs(d.totalOpEx || 0);
  const opProfit = Math.abs(d.ebitda || 0);

  nodes.push({ id: 'Operating Profit', color: COL.ebitda, column: 3 });
  links.push(['Gross Profit', 'Operating Profit', opProfit]);

      // Column 4: Operating Profit -> Net Profit + Tax (20% corporate tax)
      const taxAmount = opProfit * 0.20;
      const netProfitVal = opProfit - taxAmount;
      if (opProfit > 0) {
        nodes.push({ id: 'Net Profit', color: COL.netProfit, column: 4 });
        nodes.push({ id: 'Tax', color: COL.tax, column: 4 });
        links.push(['Operating Profit', 'Net Profit', netProfitVal]);
        links.push(['Operating Profit', 'Tax', taxAmount]);
      }

  if (totalOpExVal > 0) {
    nodes.push({ id: 'Operating Expenses', color: '#94a3b8', column: 3 });
    links.push(['Gross Profit', 'Operating Expenses', totalOpExVal]);
  }

  if (d.bespokeCOGS) { nodes.push({ id: 'Bespoke COGS', color: COL.bespokeCogs, column: 3 }); links.push(['Gross COGS', 'Bespoke COGS', Math.abs(d.bespokeCOGS)]); }
  if (d.modulesCOGS) { nodes.push({ id: 'Modules COGS', color: COL.modulesCogs, column: 3 }); links.push(['Gross COGS', 'Modules COGS', Math.abs(d.modulesCOGS)]); }
  if (d.boardsCOGS)  { nodes.push({ id: 'Boards COGS', color: COL.boardsCogs, column: 3 }); links.push(['Gross COGS', 'Boards COGS', Math.abs(d.boardsCOGS)]); }

  // Column 4: Operating Expenses -> S&M, R&D, G&A, Other OpEx
  if (d.sm) { nodes.push({ id: 'S&M', color: COL.sm, column: 4 }); links.push(['Operating Expenses', 'S&M', Math.abs(d.sm)]); }
  if (d.rd) { nodes.push({ id: 'R&D', color: COL.rd, column: 4 }); links.push(['Operating Expenses', 'R&D', Math.abs(d.rd)]); }
  if (d.ga) { nodes.push({ id: 'G&A', color: COL.ga, column: 4 }); links.push(['Operating Expenses', 'G&A', Math.abs(d.ga)]); }

  const otherOpEx = Math.abs(d.totalOpEx || 0) - Math.abs(d.sm || 0) - Math.abs(d.rd || 0) - Math.abs(d.ga || 0);
  if (otherOpEx > 0) {
    nodes.push({ id: 'Other OpEx', color: '#94a3b8', column: 4 });
    links.push(['Operating Expenses', 'Other OpEx', otherOpEx]);
  }

  if (chart) chart.destroy();

  chart = Highcharts.chart('sankeyChart', {
    chart: {
      backgroundColor: 'transparent',
      style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }
    },
    title: { text: null },
    credits: { enabled: false },
    exporting: { enabled: false },
    tooltip: {
      backgroundColor: '#1a1d27',
      borderColor: '#3a3f55',
      style: { color: '#e0e0e0', fontSize: '12px' },
      nodeFormatter: function() {
        return '<b>' + this.name + '</b><br>' + fmt(this.sum);
      },
      pointFormatter: function() {
        return this.fromNode.name + ' \u2192 ' + this.toNode.name +
          '<br><b>' + fmt(this.weight) + '</b>' +
          ' (' + pct(this.weight / (d.totalRev || 1)) + ' of revenue)';
      }
    },
    plotOptions: {
      sankey: {
        nodeWidth: 8,
        nodePadding: 28,
        curveFactor: 0.6,
        linkOpacity: 0.45,
        borderWidth: 0,
        colorByPoint: false,
        dataLabels: {
          enabled: true,
          color: '#e0e0e0',
          style: { fontSize: '11px', fontWeight: '600', textOutline: 'none' },
          nodeFormatter: function() {
            const name = this.point.name || this.key;
            let extra = '';
            if (name === 'Gross Profit') extra = '<br><span style="font-size:10px;color:#888">' + pct(d.grossMargin || 0) + ' margin</span>';
            else if (name === 'Operating Profit') extra = '<br><span style="font-size:10px;color:#888">' + pct(d.ebitdaMargin || 0) + ' margin</span>';
                    else if (name === 'Net Profit') extra = '<br><span style="font-size:10px;color:#888">' + pct(Math.abs(this.point.sum) / (d.totalRev || 1)) + ' of rev</span>';
                    else if (name === 'Tax') extra = '<br><span style="font-size:10px;color:#888">20% rate</span>';
            else if (name === 'Gross COGS') extra = '<br><span style="font-size:10px;color:#888">' + pct(Math.abs(this.point.sum) / (d.totalRev || 1)) + ' of rev</span>';
            else if (name === 'Operating Expenses') extra = '<br><span style="font-size:10px;color:#888">' + pct(Math.abs(this.point.sum) / (d.totalRev || 1)) + ' of rev</span>';
            else if (name !== 'Revenue') extra = '<br><span style="font-size:10px;color:#888">' + pct(Math.abs(this.point.sum) / (d.totalRev || 1)) + ' of rev</span>';
            return '<span style="font-weight:600">' + name + '</span><br>' + fmt(this.point.sum) + extra;
          },
          useHTML: true
        },
        states: {
          hover: { linkOpacity: 0.7 },
          inactive: { linkOpacity: 0.15 }
        }
      }
    },
    series: [{
      type: 'sankey',
      keys: ['from', 'to', 'weight'],
      nodes: nodes,
      data: links
    }]
  });

  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value blue">${fmt(d.totalRev || 0)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Gross Profit</div>
      <div class="kpi-value green">${fmt(d.grossProfit || 0)}</div>
      <div class="kpi-sub">Margin: ${pct(d.grossMargin || 0)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total OpEx</div>
      <div class="kpi-value amber">${fmt(d.totalOpEx || 0)}</div>
      <div class="kpi-sub">${pct((d.totalOpEx || 0) / (d.totalRev || 1))} of revenue</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Operating Profit (EBITDA)</div>
      <div class="kpi-value ${(d.ebitda || 0) >= 0 ? 'green' : 'red'}">${fmt(d.ebitda || 0)}</div>
      <div class="kpi-sub">Margin: ${pct(d.ebitdaMargin || 0)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Revenue Mix</div>
      <div class="kpi-value purple">${pct((d.modulesRev || 0) / (d.totalRev || 1))}</div>
      <div class="kpi-sub">Modules share</div>
    </div>
  `;
}

function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

const scenarioTabsEl = document.getElementById('scenarioTabs');
scenarios.forEach(s => {
  const tab = document.createElement('div');
  tab.className = 'scenario-tab' + (s === activeScenario ? ' active' : '');
  tab.setAttribute('data-scenario', s);
  tab.textContent = s;
  tab.onclick = () => {
    activeScenario = s;
    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(activeYear);
  };
  scenarioTabsEl.appendChild(tab);
});

const tabsEl = document.getElementById('yearTabs');
years.forEach((y, i) => {
  const tab = document.createElement('div');
  tab.className = 'year-tab' + (i === 0 ? ' active' : '');
  tab.textContent = y;
  tab.onclick = () => {
    document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSankey(y);
  };
  tabsEl.appendChild(tab);
});

const params = new URLSearchParams(window.location.search);
if (params.get('scenario') && scenarios.includes(params.get('scenario'))) activeScenario = params.get('scenario');
if (params.get('year') && years.includes(params.get('year'))) activeYear = params.get('year');

(async () => {
  try {
    await loadData();
    const ts = dataTimestamp ? new Date(dataTimestamp).toLocaleString() : 'unknown';
    setStatus('live', 'Data snapshot from ' + ts);

    const labels = rawLabels[activeScenario] || [];
    console.log('Row labels in ' + activeScenario + ':', labels);

    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-scenario') === activeScenario));
    document.querySelectorAll('.year-tab').forEach(t => t.classList.toggle('active', t.textContent === activeYear));
    renderSankey(activeYear);
  } catch (err) {
    setStatus('error', 'Failed: ' + err.message);
    console.error(err);
  }
})();
</script>
</body>
</html>
